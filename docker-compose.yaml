version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"        # Qdrant HTTP/API
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334

  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    image: crashout_fastapi:latest
    container_name: crashout_fastapi
    ports:
      - "8000:80"
    restart: unless-stopped
    depends_on:
      - ollama
      - qdrant
    environment:
      - PYTHONUNBUFFERED=1
      - OLLAMA_HOST=http://ollama:11434
    # Optional: mount the local app directory for development. Remove the volume for immutable production images.
    # - ./app:/code/app:ro

volumes:
  ollama_data:
  qdrant_storage:


