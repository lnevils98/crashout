version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./entrypoints/entrypoint-ollama.sh:/entrypoint.sh:ro
    entrypoint: /bin/bash /entrypoint.sh
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"        # Qdrant HTTP/API
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334

  fastapi:
    build: 
      dockerfile: Dockerfile
  
    container_name: crashout_fastapi
    ports:
      - "8000:80"
    restart: unless-stopped
    depends_on:
      - ollama
      - qdrant
    environment:
      - PYTHONUNBUFFERED=1
      - OLLAMA_HOST=http://ollama:11434
      - QDRANT_HOST=http://qdrant:6333
    # Optional: mount the local app directory for development. Remove the volume for immutable production images.
    # - ./app:/code/app:ro

  frontend:
    build: ./app/frontend
    container_name: crashout_frontend
    ports:
      - "3000:5173"
    environment:
      - VITE_BACKEND_URL=http://backend:5000
#    depends_on:
#      - backend

volumes:
  ollama_data:
  qdrant_storage:


